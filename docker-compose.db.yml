services:
  db:
    image: mariadb:11
    env_file:
      - ./.local/install/db.env
    volumes:
      - b24_db_data:/var/lib/mysql
    ports:
      - "127.0.0.1:${B24_DB_PORT:-13306}:3306"
    healthcheck:
      test: ["CMD-SHELL", "mariadb-admin ping -h 127.0.0.1 -u$MYSQL_USER -p$MYSQL_PASSWORD --silent"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 20s
    restart: unless-stopped

volumes:
  b24_db_data:
