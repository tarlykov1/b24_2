services:
  db:
    image: mariadb:11
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-b24_runtime}
      MYSQL_USER: ${MYSQL_USER:-b24_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-b24_password}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_password}
    volumes:
      - b24_db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mariadb-admin ping -h 127.0.0.1 -u$$MYSQL_USER -p$$MYSQL_PASSWORD --silent"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 10s
    restart: unless-stopped

  web:
    build: .
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      MIGRATION_CONFIG_PATH: /app/migration.config.yml
    volumes:
      - ./migration.config.yml:/app/migration.config.yml:ro
    ports:
      - "${B24_WEB_PORT:-8080}:8000"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import base64,os,sys,urllib.request;u=os.getenv('B24_WEB_USERNAME','');p=os.getenv('B24_WEB_PASSWORD','');req=urllib.request.Request('http://127.0.0.1:8000/health');\nif u and p:req.add_header('Authorization','Basic '+base64.b64encode(f'{u}:{p}'.encode()).decode());\nresp=urllib.request.urlopen(req,timeout=5);sys.exit(0 if resp.status==200 else 1)\"",
        ]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 20s
    restart: unless-stopped

volumes:
  b24_db_data:
